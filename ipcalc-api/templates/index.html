<!DOCTYPE html>
<html>
<head>
    <title>IPCalc API</title>
</head>
<body>
    <h1>IP Calculator</h1>
    <form action="/ipcalc" method="get">
        <label for="host">IP Address:</label>
        <input type="text" id="host" name="host" placeholder="192.168.0.1" required>
        <br><br>
        <label for="mask1">Subnet Mask:</label>
        <input type="text" id="mask1" name="mask1" placeholder="24" required>
        <br><br>
        <button type="submit">Calculate</button>
    </form>
</body>
</html>
